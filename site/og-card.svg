<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FrogAlert social preview</title>
  <desc id="desc">FrogAlert wordmark beside an LED nametag showing COP DETECTED.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07130d"/>
      <stop offset="0.58" stop-color="#0b1e15"/>
      <stop offset="1" stop-color="#102b1e"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25362c"/>
      <stop offset="0.55" stop-color="#111b15"/>
      <stop offset="1" stop-color="#060a07"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#d8ff80" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
    <pattern id="matrix" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="2.4" fill="#213328"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1028" cy="295" r="320" fill="#b7f34a" opacity=".055"/>
  <path d="M0 542 C190 480 340 612 560 536 S940 460 1200 545 V630 H0Z" fill="#b7f34a" opacity=".035"/>

  <g transform="translate(74 66)">
    <g aria-hidden="true">
      <path d="M5 19 C5 6 15 0 27 0 C40 0 49 7 49 19 C49 32 39 41 27 41 C15 41 5 32 5 19Z" fill="none" stroke="#b7f34a" stroke-width="4"/>
      <circle cx="17" cy="16" r="3.5" fill="#d8ff80"/>
      <circle cx="37" cy="16" r="3.5" fill="#d8ff80"/>
      <path d="M18 29 Q27 35 36 29" fill="none" stroke="#b7f34a" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="67" y="31" fill="#f2eedf" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" font-weight="800" letter-spacing="3">FROGALERT.ORG</text>
  </g>

  <g transform="translate(74 178)">
    <text x="0" y="0" fill="#f2eedf" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="102" font-weight="850" letter-spacing="-7">FROG</text>
    <text x="294" y="0" fill="#b7f34a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="102" font-weight="850" letter-spacing="-7">ALERT</text>
    <text x="0" y="68" fill="#f2eedf" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="720">Bluetooth alerts on a nametag.</text>
    <text x="0" y="122" fill="#9bb1a2" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="1">CH582M  ·  PASSIVE BLE  ·  LOCAL ONLY</text>
  </g>

  <g transform="translate(76 420)">
    <rect width="497" height="82" rx="12" fill="#102b1e" stroke="#b7f34a" stroke-opacity=".28"/>
    <circle cx="33" cy="41" r="7" fill="#b7f34a" filter="url(#glow)"/>
    <text x="55" y="35" fill="#d8ff80" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="17" font-weight="800" letter-spacing="1">NAME BADGE + BT COUNTER</text>
    <text x="55" y="61" fill="#9bb1a2" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15">Open firmware. No cloud log.</text>
  </g>

  <g transform="translate(721 68) rotate(3 205 250)" filter="url(#shadow)">
    <path d="M154 35 C154 0 175 -26 205 -26 C235 -26 256 0 256 35" fill="none" stroke="#f2eedf" stroke-opacity=".18" stroke-width="27" stroke-linecap="round"/>
    <rect x="0" y="35" width="410" height="492" rx="34" fill="url(#badge)" stroke="#52685a" stroke-width="2"/>
    <rect x="24" y="61" width="362" height="438" rx="22" fill="none" stroke="#fff" stroke-opacity=".045"/>

    <text x="37" y="95" fill="#9bb1a2" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1.4">BADGEMAGIC // 11×44</text>
    <circle cx="359" cy="88" r="5" fill="#b7f34a" filter="url(#glow)"/>

    <rect x="34" y="122" width="342" height="204" rx="15" fill="#010302" stroke="#24362b"/>
    <rect x="48" y="136" width="314" height="176" fill="url(#matrix)"/>
    <g fill="#d8ff80" filter="url(#glow)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-weight="900" text-anchor="middle">
      <text x="205" y="212" font-size="52" letter-spacing="8">COP</text>
      <text x="205" y="274" font-size="41" letter-spacing="2">DETECTED</text>
    </g>

    <g transform="translate(43 360)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
      <text x="0" y="0" fill="#72877a" font-size="12" font-weight="800" letter-spacing="1.5">DISPLAY MODE</text>
      <text x="0" y="35" fill="#f2eedf" font-size="25" font-weight="800">NAMETAG</text>
      <path d="M147 25 H217" stroke="#52685a" stroke-width="2"/>
      <path d="M204 15 L218 25 204 35" fill="none" stroke="#b7f34a" stroke-width="3"/>
      <text x="240" y="35" fill="#d8ff80" font-size="25" font-weight="800">BT 24</text>
    </g>

    <line x1="43" y1="432" x2="367" y2="432" stroke="#52685a" stroke-opacity=".42"/>
    <text x="43" y="469" fill="#9bb1a2" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="700" letter-spacing="1">PASSIVE SCAN  ·  NO PAIRING  ·  NO CLOUD</text>
  </g>

  <rect x="74" y="570" width="1052" height="1" fill="#d8ff80" opacity=".16"/>
  <text x="74" y="600" fill="#72877a" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" font-weight="700" letter-spacing="1">EXPERIMENTAL FIRMWARE · HARDWARE TESTING IN PROGRESS</text>
</svg>
